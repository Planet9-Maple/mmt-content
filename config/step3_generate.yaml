  ## 레벨 3 (4-6세) — "감정·반응·구체성이 풍부해진 것"

  ### 엄마 문장 규칙
  - **정보 밀도**: 감정 반응, 상황 묘사, 구체적 설명이 추가
  - **핵심: 복잡한 문법이 아니라 "감탄 + 짧은 문장 연속"으로 자연스럽게 길어지는 것**
  - **말투: 4-6세 아이에게 말하는 엄마의 따뜻한 구어체**

  ### 🚨 L3 최우선 금지: 동화책/교과서 스타일

  **L3가 길어지는 올바른 방식**: 행동/지시 추가 (동사 중심)
  **L3가 길어지면 안 되는 방식**: 묘사/형용사 추가 (형용사 중심)

  ❌ **절대 금지 - 동화책 동사 (일상에서 안 씀)**
  - snuggle, flutter, twinkle, sparkle, shimmer, glisten
  - tiptoe, scamper, tumble, nestle, cuddle up
  - 대체: get under, go to sleep, move, lie down

  ❌ **절대 금지 - 형용사 과다 (한 명사에 2개 이상)**
  - ❌ "beautiful blue sky" → ✅ "blue sky" 또는 그냥 "sky"
  - ❌ "comfy soft pajamas" → ✅ "pajamas" 또는 "your pajamas"
  - ❌ "nice warm bath" → ✅ "a bath" 또는 "your bath"

  ❌ **절대 금지 - 불필요한 부사**
  - ❌ "so peacefully", "really gently", "very quietly"
  - ❌ "floating peacefully" → ✅ "floating" 또는 "Look at the clouds!"
  - 부사 없이도 의미 전달되면 삭제

  ❌ **절대 금지 - 서술적 관찰 (대화가 아닌 묘사)**
  - ❌ "They're floating in the beautiful blue sky."
  - ❌ "The stars are twinkling so brightly tonight."
  - ✅ "Look at those clouds!" (지시) + "So fluffy!" (감탄)

  **L3 길이 늘리는 올바른 방법:**
  - 행동 추가: "Put on your pajamas. Now get under the blanket." (동사 2개)
  - 질문 추가: "Which pajamas do you want? The blue ones?"
  - 짧은 문장 연속: "Time for bed. Get your blanket. Cozy, right?"
  - 대시 연결: "Let's get ready for bed—grab your pajamas!"

  **L3 길이 늘리면 안 되는 방법:**
  - 형용사 추가: ❌ "comfy soft warm"
  - 부사 추가: ❌ "so peacefully gently"
  - 서술적 묘사: ❌ "floating in the beautiful sky"

  ### 🚫 영어 6대 원칙 (모든 레벨 공통, L3에서 특히 중요)

  **1. 설명 < 지시** - 이유를 길게 설명하지 않음
  - ❌ "Since ~", "Now that ~", "Because ~" 로 시작하는 문장
  - ✅ 행동/감정 먼저, 이유는 짧게 뒤에 (또는 생략)

  **2. 추상적 < 직관적** - 아이가 바로 이해하는 단어
  - ❌ "independent", "responsible", "mature", "healthy"
  - ✅ "cool", "amazing", "great", "yummy", "fun"

  **3. 숫자/데이터 금지** - 구체적 수치는 교육 자료 느낌
  - ❌ "for 20 seconds", "3 times", "in 5 minutes"
  - ✅ "for a bit", "a few times", "soon", "almost"

  **4. 논리 < 감정** - 인과관계보다 감정 반응
  - ❌ "If you do X, Y will happen", "That makes you ~"
  - ✅ "Wow!", "Amazing!", "I love it!", "So cool!"

  **5. 교훈/위협 금지** - 매 순간 교훈 전달 X
  - ❌ "so you won't ~", "or you'll ~", "that's what big kids do"
  - ✅ 그냥 하자고 하면 됨. 이유 없이.

  **6. 구어체** - 말하듯 자연스럽게
  - ✅ 대시(—), 감탄사, 짧은 문장, 불완전한 문장 허용
  - ❌ 완벽한 문어체, 교과서 문장

  ### ✅ L3 자연스러운 패턴 (DB 실제 사용)

  **패턴 1: 대시(—)로 감탄/반응 연결 (39.7%)**
  - "Come give me a big hug—wow, you're so warm."
  - "You did such a great job—your room looks so clean now!"
  - "Wow! You did this by yourself—that's amazing."

  **패턴 2: 짧은 문장 2-3개 연속 (가장 자연스러움)**
  - "Good morning, my love. Did you sleep well last night?"
  - "Oh no, it fell over! That's okay—we can try again together."
  - "I'll cut it into small pieces. How about this size?"

  **패턴 3: 간단한 and/but 연결**
  - "Let's head to the kitchen and get some breakfast."
  - "I know you want to keep playing, but it's really time for bed now."

  **패턴 4: when만 제한적 허용 (14%)**
  - "When you're done eating, we can play together."

  ### 단어 수 가이드라인 (단어 수 강박 탈피!)
  - **🚨 단어 수를 늘리기 위해 억지로 수식어/형용사/부사를 넣지 마세요.**
  - 개별 문장: 8-16단어 범위 내에서 자연스럽게 작성
  - **3문장 합계: 25~45단어** (길이보다 "자연스러운 흐름"이 100배 중요함)
  - 핵심은 "길이"가 아니라 "정보의 층위(상황, 제약, 구체적 장소/시간)"가 자연스럽게 추가되는 것입니다.

  ### ✅ L3 좋은 예시 (DB 기반 - 자연스러운 구어체)
  - "It's cleanup time! Let's put all your toys back where they belong." (14w)
  - "What are you drawing? Tell me about your picture." (9w)
  - "Ready or not, here I come! Where could you be?" (10w)
  - "Wow! You did this by yourself—that's amazing." (7w)
  - "I'll be careful so it won't get in your eyes. Hold still for me." (13w)

  ### ✅ L2 → L3 확장 패턴 (자연스러운 방식)
  - L2: "Dinner's almost ready now." → L3: "Dinner's almost ready, sweetie—just a few more minutes!" (대시 + 구체적 시간)
  - L2: "Let's put on your shoes." → L3: "Let's put on your shoes! You can do the straps by yourself now." (짧은 문장 연속)

  ### 아이 반응 (항상 2세트) — 레벨 3 상세 규칙

  **🚨 핵심 원칙**: "아이 말투 + 가르칠 수 있는 자연스러운 문장"
  - 문법적으로 완전한 문장 (주어 + 동사)
  - 조동사(can, will, should), to부정사(want to, try to), 의문문 자유
  - 3-6단어 (평균 4.4단어)

  **✅ L3 아이 반응 허용 패턴**
  - 조동사 확장: "I'll win!"  "I can do it!"  "I won't touch it."
  - want to 확장: "I want to win!"  "I want to read this one!"
  - 상태 묘사: "My hands are dirty!"  "It's too cold!"  "That's my toy!"
  - 의문문: "Can we follow them?"  "Did you sleep well, Mommy?"
  - 감정 표현: "I'm so fast today!"  "I love the park!"

  **L3 아이 반응 패턴 비율 (DB 기반)**
  - 3-4단어 (57%): "My coat is right here!" "I'll stay still." "This toy goes here!"
  - 5-6단어 (37%): "Did you sleep well, Mommy?" "I want to read this one!"
  - ⚠️ 1-2단어 반응은 L3에서 거의 없음 (2.6%만)

  ---

  ## 한국어 대응 규칙
  - 영어를 직역하는 것이 아니라, "한국 엄마가 같은 상황에서 실제로 말할 법한 자연스러운 톤."
  - 정보 층위도 레벨에 맞게 확장:
    - L1: "아침 먹으러 가자" (행동 하나)
    - L2: "자, 아침 먹으러 가자" (부드러운 시작어 추가)
    - L3: "이제 부엌으로 가서 아침 먹자" (구체적 장소+동선)

  ### 🚫 한국어 6대 원칙 (영어와 동일하게 적용)

  **1. 설명 < 지시**: "왜냐하면~" 긴 설명 금지. 행동 먼저.
  **2. 추상적 < 구체적**: "건강해져", "독립적" 같은 개념어 금지. 감각어 사용.
  **3. 숫자 금지**: "20초", "3번" 같은 구체적 수치 금지. "잠깐", "조금" 사용.
  **4. 논리 < 감정**: "~하면 ~해진다" 금지. "와!", "잘했어!" 사용.
  **5. 교훈 금지**: "~해야 나중에~" 미래 위협/도덕 교훈 금지.
  **6. 자연스러운 흐름**: "자~", "어~", "그래그래" 같은 구어체 허용.

  ---

  ## A/B/C 3안 생성 규칙
  - 모든 안은 동일한 설계도(Step 2 출력)를 따릅니다.
  - 차이점은 "단어 선택"과 "톤의 미세 변화"에서만.
  - A안: 가장 기본적이고 안전한 표현
  - B안: 약간 더 캐주얼하거나 감정이 풍부한 표현
  - C안: 약간 다른 상황 해석이나 대안적 표현
  - 3안 모두 위의 레벨별 규칙을 100% 준수.


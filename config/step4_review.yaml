  ## must_fix 형식 (issues와 별도로 반드시 수정해야 할 항목)
  must_fix 배열에는 다음 형식으로 구체적 수정 지시를 포함:

  **🚨 L1 예시 (Chopped Sentences - 가장 흔한 AI 실수, 최우선 체크):**
  {
    "sentence_num": 1,
    "problem": "Chopped Sentences: 한 줄에 1-3단어 파편 문장 2개 이어붙임 (Look! + No more rain!)",
    "original": "Look! No more rain!",
    "fix_instruction": "대시(—)로 연결하거나 완전문(5-8단어)으로 재작성",
    "suggested_fix": "Look, the rain stopped! Want to go outside?"
  }

  **🚨 L3 예시 (동화적 묘사 및 과도한 수식어 남발 - 최우선 체크):**
  {
    "sentence_num": 2,
    "problem": "현실감 없는 동화적 묘사 (floating so peacefully in the beautiful blue sky)",
    "original": "They're floating so peacefully in the beautiful blue sky.",
    "fix_instruction": "서술적 풍경 묘사를 지우고, 행동 지시나 짧은 감탄으로 대체",
    "suggested_fix": "Look at the clouds up there! They look so fluffy."
  }
  {
    "sentence_num": 3,
    "problem": "과장된 동화책 동사 사용 (snuggle under)",
    "original": "Change into these comfy pajamas and then snuggle under your blanket.",
    "fix_instruction": "일상적이고 현실적인 동사(get under)로 대체. 불필요한 수식어(comfy) 제거.",
    "suggested_fix": "Put on your pajamas, then get under the blanket."
  }

  **L3 예시 (추상적 어휘):**
  {
    "sentence_num": 1,
    "problem": "추상적 어휘 'independent' 사용",
    "original": "that makes you really independent",
    "fix_instruction": "'That's so cool!' 또는 'Amazing!'으로 대체",
    "suggested_fix": "That's so cool!"
  }

  **L1 예시 (단어 수 부족):**
  {
    "sentence_num": 0,
    "problem": "L1 3문장 합계 8단어 - DB 최소(14단어)보다 43% 부족. Chopped Sentences 포함.",
    "original": "Look! No more rain! + Open the window. So fresh! + Let's go outside now.",
    "fix_instruction": "3문장 합계 17-23단어 목표. 대시(—)와 질문(?) 활용.",
    "suggested_fix": "Look, the rain stopped! Want to go outside? + Let's open the window—it's so fresh. + Time to put on your shoes!"
  }

  **L1 예시 (상호작용 부재 - 질문 0개):**
  {
    "sentence_num": 0,
    "problem": "L1 3문장 중 질문(?) 0개 - 일방적 감탄만 나열, 대화 느낌 없음",
    "original": "The rain stopped! Open the window! Let's go outside!",
    "fix_instruction": "DB의 38%가 질문. 최소 1개 질문 포함하여 상호작용 느낌 추가.",
    "suggested_fix": "Look, the rain stopped! Want to go outside? Let's put on your boots."
  }

  **L1 예시 (구두점 다양성 위반):**
  {
    "sentence_num": 0,
    "problem": "L1 3문장 전부 느낌표(!) + 질문 0개",
    "original": "Come here! Let's go! All done!",
    "fix_instruction": "최소 1개 질문(?) 포함 필수. 느낌표 최대 2개.",
    "suggested_fix": "Come here, sweetie. Where are your shoes? Let's put them on."
  }

  ## verdict 기준
  - "pass": 점수 70% 이상 + must_fix 없음 + critical 이슈 없음
  - "revise": must_fix가 1개 이상 있거나, 점수 60-69%, 또는 minor 이슈 3개 이상
  - "reject": 점수 60% 미만 또는 critical 이슈 1개 이상

  ## auto_regenerate_needed 기준
  - true: 어떤 레벨이든 must_fix가 1개 이상 있으면 true
  - 이 경우 시스템이 자동으로 must_fix 피드백을 반영해 재생성함

  ## severity 기준
  - "critical": 문법 오류, 레벨 정보 밀도 완전 위반, 부적절한 표현, **L1 Chopped Sentences (최우선)**, **L3 부자연스러운 동화적 묘사/수식어 과다 (최우선)**, **L3 종속절 패턴 (since/now that/because)**, **L1 1-2단어 문장**, **L1 3문장 합계 14단어 미만**, **L1 3문장 전부 느낌표(!)**, **L1 질문(?) 0개 (상호작용 부재)**, **L2 1단어 아이 반응 (Here? 제외)**, **아이 반응 레벨 호환성 위반 (3️⃣ 문장 세부사항 참조)**, **L3 동화책 동사 (snuggle/flutter/twinkle 등)**, **L3 형용사 과다 (한 명사에 2개+)**, **L3 서술적 관찰문 (They're floating... 패턴)**
  - "major": 번역투, 레벨 간 차별성 부족, L2 아이 반응 구조 확장 (I will/want to share 등), 어색한 진행형 칭찬, L1 3문장 합계 16단어 미만, L1 대시(—) 미사용, **L3 불필요한 부사 (so peacefully, really gently)**
  - "minor": 톤 미세 조정, 약간 어색한 흐름
